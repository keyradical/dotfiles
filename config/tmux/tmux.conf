set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -g mouse on
set -sg escape-time 0

# Modern terminal key encoding so Ctrl+J / Ctrl+M / Ctrl+I are distinguishable
# from Enter / Tab. kitty and Wezterm both negotiate this; without it, the
# terminal collapses C-j into LF and vim-tmux-navigator's <C-j> binding fires
# Enter instead of switching panes.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config without restarting tmux
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Tokyo Night status bar config
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style hide
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_zoom_id_style hide
set -g @tokyo-night-tmux_window_tidy_icons 1
set -g @tokyo-night-tmux_show_git 0

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# vi-mode
set-window-option -g mode-keys vi
bind '[' copy-mode -e

# Copy-mode bindings
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi q      send-keys -X cancel
bind-key -T copy-mode-vi C-u    send-keys -X halfpage-up
bind-key -T copy-mode-vi C-d    send-keys -X halfpage-down
bind-key -T copy-mode-vi v      send-keys -X begin-selection
bind-key -T copy-mode-vi C-v    send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y      send-keys -X copy-selection-and-cancel

# Splits open in current path
bind '-' split-window -v -c "#{pane_current_path}"
bind '"' split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

# Resize panes with H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Make status bar more compact
set -g status-interval 10
set -g status-justify left

# Initialize TPM (keep at very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
